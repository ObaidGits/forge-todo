name: forge
description: Forge — Build Better Every Day.
publish_to: none
version: 0.1.0+1
homepage: https://github.com/forge-productivity/forge
repository: https://github.com/forge-productivity/forge
issue_tracker: https://github.com/forge-productivity/forge/issues

# Keep these exact pins aligned with docs/evidence/toolchain-dependency-contract.json.
environment:
  sdk: 3.12.2
  flutter: 3.44.6

dependencies:
  drift: 2.33.0
  flutter:
    sdk: flutter
  # Real OS notification transport behind the NotificationTransport port
  # (R-NOTIFY-003/004). The plugin never leaks past
  # lib/features/notifications/infrastructure/local_notifications_transport.dart;
  # ReminderService and the horizon reconciler stay plugin-free. Pinned exact to
  # match the toolchain-dependency contract style.
  flutter_local_notifications: 22.1.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 3.3.2
  flutter_secure_storage: ^10.3.1
  go_router: 17.3.0
  # HTTP client for the optional Supabase sync transport + GoTrue auth adapter.
  # It is used ONLY behind lib/features/sync/infrastructure/* — no domain,
  # application, or other feature imports `package:http`. Pinned exact to match
  # the toolchain-dependency contract style.
  home_widget: ^0.9.3
  # Desktop "sticky widget": global summon/toggle shortcut (task §6, default
  # Ctrl+Alt+T). Used ONLY behind lib/app/desktop/*, guarded by platform so
  # Android/iOS is unaffected. The Linux plugin needs the system
  # `keybinder-3.0` dev package at build time (now installed here). The hotkey
  # stays abstracted behind `GlobalHotkeyBinder`
  # (lib/app/desktop/desktop_bindings.dart) so tests/headless keep the safe
  # no-op binder; the real binder is wired on desktop in main.dart.
  hotkey_manager: ^0.2.3
  http: 1.6.0
  intl: 0.20.2
  # Desktop "sticky widget": autostart on login (Windows registry /
  # ~/.config/autostart). Used ONLY behind lib/app/desktop/*, guarded by platform.
  launch_at_startup: ^0.5.1
  # Pure-Dart, synchronous crypto primitives (AES-256-GCM AEAD + HMAC-SHA256
  # HKDF) for the encrypted notes draft journal (R-NOTE-005). Synchronous by
  # design: draft seal/open runs inside a DB write transaction, so it must not
  # use isolates/plugins/Futures (design.md §5). pointycastle is pure Dart.
  local_auth: ^3.0.2
  # Resolves the per-OS app-support directory on mobile (Android/iOS) where the
  # environment-based desktop resolution has no valid location. Used ONLY inside
  # the mobile branch of bootstrap's base-directory resolver; desktop keeps the
  # dependency-free environment lookup, so desktop/Linux behavior is unchanged.
  path_provider: ^2.1.5
  pointycastle: 4.0.0
  # The native SQLite provider. The `hooks.user_defines` block below selects the
  # sqlite3mc source so the bundled native asset is the encrypted (multiple
  # ciphers) build the encrypted store opens with a `PRAGMA key` (ADR-0001).
  receive_sharing_intent: 1.8.1
  sqlite3: 3.4.0
  timezone: 0.11.1
  # Desktop "sticky widget": system tray icon + context menu. Used ONLY behind
  # lib/app/desktop/*, guarded by platform so Android/iOS is unaffected.
  tray_manager: ^0.5.0
  # Desktop "sticky widget": frameless, always-on-top, drag/resize, and window
  # geometry persistence. Used ONLY behind lib/app/desktop/*, guarded by platform.
  window_manager: ^0.5.1

dev_dependencies:
  build_runner: 2.15.1
  crypto: 3.0.7
  drift_dev: 2.33.0
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter
  # On-device/emulator smoke test that the real app boots to Today with the
  # mobile adapters wired. Test-only; not shipped in the app.
  integration_test:
    sdk: flutter

# Select the sqlite3mc native-asset source for the `sqlite3` package so the
# compiled/linked native library is the encrypted (SQLite3 Multiple Ciphers)
# build. This is the production encryption provider gated by ADR-0001.
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/licenses/
    # Desktop system-tray icon (Linux uses the PNG, Windows the ICO). Loaded
    # only by the desktop tray binding, guarded by platform.
    - assets/tray/
