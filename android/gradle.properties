org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Some plugins (e.g. receive_sharing_intent) ship a Kotlin-only Android library
# without setting an explicit Java/Kotlin JVM target. Under AGP 9 + built-in
# Kotlin this trips the strict "Inconsistent JVM-target" check (empty Java
# javac task defaults to 11 while Kotlin uses 17). The plugin has no Java
# sources, so the mismatch is cosmetic; relax the check to a warning so the
# third-party module builds. The app module itself pins JVM 17 explicitly.
kotlin.jvm.target.validation.mode=warning
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
