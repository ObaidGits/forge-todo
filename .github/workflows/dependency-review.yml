name: Dependency review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dependency-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Review advisories and licenses
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9
        with:
          fail-on-severity: high
          allow-licenses: Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MIT
